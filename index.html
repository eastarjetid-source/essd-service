<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EASTAR JET - 지정좌석 구매 서비스</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI","맑은 고딕",sans-serif;
    -webkit-tap-highlight-color: transparent;
}
body{
    background:#ffffff;
    color:rgb(17, 17, 17);
    overflow:hidden;
    position: fixed;
    width: 100%;
    height: 100%;
}
/* ================= HEADER ================= */
header{
    height:80px;
    background:rgb(210, 0, 21);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 25px;
}
.logo{
    display: flex;
    align-items: center;
    gap: 12px;
}
.logo .brand { font-size:24px; font-weight:900; letter-spacing: -0.5px; }
.logo .sub-title { font-size:18px; font-weight:normal; opacity:0.9; letter-spacing:-0.5px; border-left: 1px solid rgba(255,255,255,0.4); padding-left: 12px; }
.flight{ display:flex; gap:35px; align-items: center; }
.flight div{ text-align:center; }
.flight label{ display:block; font-size:12px; opacity:.8; }
.flight span{ font-size:22px; font-weight:bold; }

.print-btn {
    background: #ffffff;
    color: rgb(210, 0, 21);
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    transition: background 0.2s;
}
.print-btn:hover { background: #f5f5f5; }

main{ display:flex; height:calc(100vh - 80px); }

/* ================= LEFT (Cabin Layout) ================= */
.left{
    width:42%; background:#f4f7f9; padding:30px 20px; border-right:1px solid rgb(192, 192, 192);
    overflow:auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; align-items: center;
}
.left h2{ color:rgb(210, 0, 21); text-align:center; margin-bottom:25px; font-size: 20px; }
.airplane-body {
    background: #ffffff; border: 3px solid rgb(158, 162, 161); border-top-left-radius: 120px 200px; border-top-right-radius: 120px 200px;
    padding: 60px 20px 40px 20px; width: 100%; max-width: 380px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}
.cockpit { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
.cockpit-window { width: 35px; height: 14px; background: rgb(48, 58, 60); border-radius: 3px; }
.cockpit-window.left-w { transform: skewY(-10deg); border-top-left-radius: 8px;}
.cockpit-window.right-w { transform: skewY(10deg); border-top-right-radius: 8px;}
.headerSeat{ display:grid; grid-template-columns: 28px 28px 28px 40px 28px 28px 28px; justify-content:center; gap:6px; margin-bottom:15px; font-weight:bold; text-align: center; color:rgb(48, 58, 60); font-size: 14px; }
#seatMap{ display:flex; flex-direction:column; gap:7px; position: relative; }
.cabinRow{ display:grid; grid-template-columns: 28px 28px 28px 40px 28px 28px 28px; justify-content:center; align-items:center; gap:6px; position: relative; }
.rowNo{ text-align:center; font-size:12px; font-weight:bold; color:rgb(86, 90, 91); background: #eef2f5; border-radius: 4px; padding: 3px 0; position: relative; }
.exit-gate { position: absolute; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: bold; color: rgb(142, 1, 20); white-space: nowrap; pointer-events: none; }
.exit-gate.left-gate { left: -65px; } 
.exit-gate.right-gate { right: -65px; } 
.cabinSeat{ width:28px; height:28px; border-radius:6px; background:#e0e0e0; transition:.15s; cursor: pointer; }
.cabinSeat.sale{ background: rgb(126, 206, 244); }
.cabinSeat.sold{ background:white; border:2px solid rgb(142, 1, 20); position:relative; }
.cabinSeat.sold::before, .cabinSeat.sold::after{ content:""; position:absolute; left:3px; right:3px; top:11px; height:2px; background:rgb(142, 1, 20); }
.cabinSeat.sold::before{ transform:rotate(45deg); }
.cabinSeat.sold::after{ transform:rotate(-45deg); }

/* ================= RIGHT ================= */
.right{ flex:1; padding:25px; display: flex; flex-direction: column; gap: 20px; overflow: hidden; background: #ffffff; }
.card{ background: #ffffff; border: 1px solid rgb(215, 225, 230); border-radius: 12px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); display: flex; flex-direction: column; gap: 18px; min-height: 0; }
.cardHeader{ display:flex; justify-content:space-between; align-items:center; border-bottom: 3px solid rgb(126, 206, 244); padding-bottom: 10px; }
.titleArea { display: flex; align-items: center; gap: 12px; }
.cardHeader h2{ color: rgb(48, 58, 60); font-size: 24px; font-weight: 900; }
.priceBadge { font-size: 14px; font-weight: bold; color: rgb(17, 17, 17); background: #f5f5f5; padding: 3px 12px; border-radius: 6px; border: 1px solid rgb(192, 206, 209); }
.priceBadge span { color: rgb(30, 144, 255); }
.count{ background: rgb(126, 206, 244); color: rgb(48, 58, 60); padding:6px 16px; border-radius:20px; font-weight:bold; font-size: 14px; }
.noticeBox { padding: 12px; background: #f9fbfc; border-radius: 8px; font-size: 12px; color: rgb(48, 58, 60); line-height: 1.6; border: 1px solid rgb(192, 206, 209); }
.noticeBox .warning-title { color: rgb(142, 1, 20); font-weight: bold; margin-bottom: 4px; }

.benchGridContainer { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.benchRow { display: flex; align-items: center; justify-content: center; width: 100%; gap: 10px; }
.benchSide { display: flex; gap: 8px; flex: 1; }
.benchSide.leftSide { justify-content: flex-end; }
.benchSide.rightSide { justify-content: flex-start; }
.benchCenterNo { width: 50px; text-align: center; font-size: 26px; font-weight: 800; color: rgb(48, 58, 60); user-select: none; }
.emptyPlaceholder { flex: 1; }

.seatTile {
    flex: 1; max-width: 120px; min-height: 65px; aspect-ratio: 1.3 / 1; border-radius: 8px;
    background: rgb(126, 206, 244); color: rgb(48, 58, 60); border: 1px solid rgb(96, 176, 214);
    cursor: pointer; transition: transform 0.1s ease, background 0.15s; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; box-shadow: 0 2px 6px rgba(126,206,244,0.2);
}
.seatTile:active { transform: scale(0.94); }
.seatTile .icon { font-size: 16px; margin-bottom: 3px; opacity: 0.9; }
.seatTile .seatNo { font-size: 18px; font-weight: 900; line-height: 1; }
.seatTile.sold { background: rgb(158, 162, 161); color: rgba(255,255,255,0.3); border: 1px solid rgb(86, 90, 91); box-shadow: none; }
.seatTile.sold::before, .seatTile.sold::after { content: ""; position: absolute; width: 75%; height: 3px; background: rgb(142, 1, 20); top: 50%; left: 12.5%; }
.seatTile.sold::before { transform: rotate(45deg); }
.seatTile.sold::after { transform: rotate(-45deg); }

#setting { 
    position:fixed; right:25px; bottom:25px; width:60px; height:60px; border-radius:50%; border:none; 
    background: rgb(210, 0, 21); 
    color: white; font-size:28px; cursor:pointer; box-shadow:0 6px 15px rgba(0,0,0,.15); z-index:999; 
}
#panel { position:fixed; top:80px; right:-340px; width:320px; height:calc(100vh - 80px); background:white; transition:.25s; padding:25px; box-shadow:-5px 0 15px rgba(0,0,0,.15); overflow:auto; z-index:998; }
#panel.open{ right:0; }
#panel h2{ color: rgb(48, 58, 60); margin-bottom:20px; }
#panel label{ display:block; margin-bottom:18px; font-weight:bold; }
#panel input{ width:100%; margin-top:8px; padding:10px; border-radius:8px; border:1px solid rgb(158, 162, 161); }
#panel button{ width:100%; margin-top:15px; padding:12px; border:none; border-radius:10px; color:white; font-size:16px; cursor:pointer; }
#save { background:rgb(48, 58, 60); }
#reset { background:rgb(210, 0, 21); }

@media (max-width: 1024px) {
    main { flex-direction: column; height: calc(100vh - 70px); }
    header { height: 70px; padding: 10px 15px; }
    .logo .brand { font-size: 16px; }
    .logo .sub-title { display: none; }
    .flight { gap: 12px; }
    .flight span { font-size: 14px; }
    .left { display: none !important; }
    .right { width: 100%; height: 100%; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
    .card { padding: 16px; }
    .benchCenterNo { font-size: 20px; width: 35px; }
    .seatTile { min-height: 48px; aspect-ratio: auto; }
    .seatTile .icon { display: none !important; }
    .seatTile .seatNo { font-size: 15px; }
}

/* ================= 🖨️ 인쇄 최적화 및 1페이지 강제 맞춤 세팅 ================= */
@page {
    size: landscape; 
    margin: 8mm; /* 여백 최소화하여 여유공간 확보 */
}

@media print {
    html, body {
        width: 100% !important;
        height: 100% !important;
        overflow: hidden !important;
        position: static !important;
    }
    body {
        zoom: 0.9 !important; 
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        background: #ffffff !important;
    }
    /* 안내 문구(.noticeBox)는 숨기지 않고 노출 유지 */
    .time-box, #setting, #panel, .print-btn {
        display: none !important; 
    }
    header {
        height: 65px !important;
        background: rgb(210, 0, 21) !important;
    }
    main {
        display: flex !important; 
        flex-direction: row !important;
        height: auto !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
    }
    .left {
        display: flex !important; 
        width: 35% !important;
        background: #f4f7f9 !important;
        padding: 8px !important;
    }
    .left h2 { margin-bottom: 12px !important; font-size: 18px !important; }
    .airplane-body {
        max-width: 270px !important;
        padding: 20px 10px 15px 10px !important;
    }
    #seatMap { gap: 4px !important; }
    .cabinRow { gap: 4px !important; }
    .right {
        width: 65% !important;
        padding: 8px 15px !important;
        overflow: visible !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 10px !important;
    }
    .card {
        border: 1px solid rgb(215, 225, 230) !important;
        box-shadow: none !important;
        padding: 10px 15px !important;
        margin-bottom: 0px !important;
        gap: 10px !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
    }
    .cardHeader {
        border-bottom: 3px solid rgb(126, 206, 244) !important;
        padding-bottom: 5px !important;
    }
    .cardHeader h2 { font-size: 20px !important; }
    .benchGridContainer {
        gap: 6px !important; 
    }
    .seatTile {
        min-height: 48px !important; /* 높이를 살짝 줄여 하단 안내창 밀림 완전 방지 */
    }
    /* 📋 인쇄 전용 안내창 축소 스타일 정돈 */
    .noticeBox {
        display: block !important;
        padding: 8px 12px !important;
        margin-top: 5px !important;
        font-size: 11px !important;
        line-height: 1.4 !important;
        background: #f9fbfc !important;
        border: 1px solid rgb(192, 206, 209) !important;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">
        <span class="brand">✈ EASTAR JET</span>
        <span class="sub-title">지정좌석 구매</span>
    </div>
    <div class="flight">
        <div><label>Flight</label><span id="flightNo">ZE536</span></div>
        <div><label>Route</label><span id="route">MDC → ICN</span></div>
        <div><label>Aircraft</label><span id="aircraft">B737-8</span></div>
        <div class="time-box"><label>Time</label><span id="clock">00:00:00</span></div>
        <button class="print-btn" onclick="window.print()">🖨️ 현황판 인쇄</button>
    </div>
</header>

<main>
    <div class="left">
        <h2>Cabin Layout</h2>
        <div class="airplane-body">
            <div class="cockpit"><div class="cockpit-window left-w"></div><div class="cockpit-window right-w"></div></div>
            <div class="headerSeat"><div>A</div><div>B</div><div>C</div><div></div><div>D</div><div>E</div><div>F</div></div>
            <div id="seatMap"></div>
        </div>
    </div>

    <div class="right">
        <div class="card">
            <div class="cardHeader">
                <div class="titleArea">
                    <h2>▶ 첫번째 열 좌석</h2>
                    <div class="priceBadge"><span>41,000원</span>/석</div>
                </div>
                <div class="count" id="frontCount">0 / 0</div>
            </div>
            <div class="benchGridContainer" id="frontArea"></div>
        </div>

        <div class="card">
            <div class="cardHeader">
                <div class="titleArea">
                    <h2>▶ 비상구 좌석</h2>
                    <div class="priceBadge"><span>41,000원</span>/석</div>
                </div>
                <div class="count" id="exitCount">0 / 0</div>
            </div>
            <div class="benchGridContainer" id="exitArea"></div>
             
            <div class="noticeBox">
                <div>• <strong>15열 좌석</strong>은 등받이가 고정되어 리클라이닝이 불가합니다.</div>
                <div class="warning-title" style="margin-top: 2px;">• 비상구 좌석 지정 불가 고객 (항공안전법 규정)</div>
                <div>노약자, 임산부, 소아 동반, 만 15세 미만, 한국어/영어 소통 불가 고객 등</div>
            </div>
        </div>
    </div>
</main>

<button id="setting">⚙</button>

<div id="panel">
    <h2>관리자 패널</h2>
    <label>편명<input id="flightInput" value="ZE536" disabled style="background:#f0f0f0; color:#999; cursor:not-allowed;"></label>
    <label>노선<input id="routeInput" value="MDC → ICN" disabled style="background:#f0f0f0; color:#999; cursor:not-allowed;"></label>
    <label>기종<input id="aircraftInput" value="B737-8"></label>
    <button id="save">정보 저장</button>
    <button id="reset">좌석 판매 초기화</button>
</div>

<script>
const FRONT_SEATS = ["1A","1B","1C","2D","2E","2F"];
const EXIT_SEATS = [
    "15A","15B","15C","15D","15E","15F",
    "16A","16B","16C","16D","16E","16F"
];
const SALE_SEATS = [...FRONT_SEATS, ...EXIT_SEATS];

let seatState = {};
let infoState = { flight: "ZE536", route: "MDC → ICN", aircraft: "B737-8" };

try {
    seatState = JSON.parse(localStorage.getItem("ESSD_SEATS")) || {};
    infoState = JSON.parse(localStorage.getItem("ESSD_INFO")) || infoState;
} catch (e) {}

function safariSafeSave(key, data) {
    try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

function updateClock(){
    const now = new Date();
    document.getElementById("clock").textContent = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
}
setInterval(updateClock, 1000); updateClock();

function isSold(seat) { return seatState[seat] === true; }

function refresh() {
    document.getElementById("flightNo").textContent = infoState.flight;
    document.getElementById("route").textContent = infoState.route;
    document.getElementById("aircraft").textContent = infoState.aircraft;
    drawCabin();
    drawBenchmarkedTiles();
}

function drawCabin(){
    const seatMap = document.getElementById("seatMap");
    seatMap.innerHTML = "";
    for(let row=1; row<=32; row++){
        const line = document.createElement("div"); line.className = "cabinRow";
        ["A","B","C"].forEach(l => line.appendChild(createCabinSeat(row+l)));
        const no = document.createElement("div"); no.className = "rowNo"; no.textContent = row; line.appendChild(no);
        if(row !== 1){ ["D","E","F"].forEach(l => line.appendChild(createCabinSeat(row+l))); } 
        else { for(let i=0; i<3; i++) { const emp = document.createElement("div"); emp.style.width = "28px"; line.appendChild(emp); } }
        if(row === 15 || row === 16) {
            const leftGate = document.createElement("div"); leftGate.className = "exit-gate left-gate"; leftGate.textContent = "← EXIT ⚠️";
            const rightGate = document.createElement("div"); rightGate.className = "exit-gate right-gate"; rightGate.textContent = "⚠️ EXIT →";
            line.appendChild(leftGate); line.appendChild(rightGate);
        }
        seatMap.appendChild(line);
    }
}

function createCabinSeat(name){
    const seat = document.createElement("div"); seat.className = "cabinSeat";
    if(SALE_SEATS.includes(name)){
        seat.classList.add("sale");
        if(isSold(name)){ seat.classList.remove("sale"); seat.classList.add("sold"); }
        seat.onclick = () => toggleSeat(name);
    }
    return seat;
}

function drawBenchmarkedTiles() {
    const frontArea = document.getElementById("frontArea"); const exitArea = document.getElementById("exitArea");
    frontArea.innerHTML = ""; exitArea.innerHTML = "";
    let frontSold = 0, exitSold = 0;

    const row1 = document.createElement("div"); row1.className = "benchRow";
    const r1Left = document.createElement("div"); r1Left.className = "benchSide leftSide";
    ["1A","1B","1C"].forEach(n => { r1Left.appendChild(makeTile(n)); if(isSold(n)) frontSold++; });
    const r1Center = document.createElement("div"); r1Center.className = "benchCenterNo"; r1Center.textContent = "1";
    const r1Right = document.createElement("div"); r1Right.className = "benchSide rightSide emptyPlaceholder";
    row1.appendChild(r1Left); row1.appendChild(r1Center); row1.appendChild(r1Right); frontArea.appendChild(row1);

    const row2 = document.createElement("div"); row2.className = "benchRow";
    const r2Left = document.createElement("div"); r2Left.className = "benchSide leftSide emptyPlaceholder";
    const r2Center = document.createElement("div"); r2Center.className = "benchCenterNo"; r2Center.textContent = "2";
    const r2Right = document.createElement("div"); r2Right.className = "benchSide rightSide";
    ["2D","2E","2F"].forEach(n => { r2Right.appendChild(makeTile(n)); if(isSold(n)) frontSold++; });
    row2.appendChild(r2Left); row2.appendChild(r2Center); row2.appendChild(r2Right); frontArea.appendChild(row2);

    [15, 16].forEach(rNum => {
        const eRow = document.createElement("div"); eRow.className = "benchRow";
        const eLeft = document.createElement("div"); eLeft.className = "benchSide leftSide";
        ["A","B","C"].forEach(l => { const n = rNum+l; eLeft.appendChild(makeTile(n)); if(isSold(n)) exitSold++; });
        const eCenter = document.createElement("div"); eCenter.className = "benchCenterNo"; eCenter.textContent = rNum;
        const eRight = document.createElement("div"); eRight.className = "benchSide rightSide";
        ["D","E","F"].forEach(l => { const n = rNum+l; eRight.appendChild(makeTile(n)); if(isSold(n)) exitSold++; });
        eRow.appendChild(eLeft); eRow.appendChild(eCenter); eRow.appendChild(eRight); exitArea.appendChild(eRow);
    });

    document.getElementById("frontCount").textContent = `${FRONT_SEATS.length - frontSold} / ${FRONT_SEATS.length}`;
    document.getElementById("exitCount").textContent = `${EXIT_SEATS.length - exitSold} / ${EXIT_SEATS.length}`;
}

function makeTile(name){
    const btn = document.createElement("button"); btn.className = "seatTile"; if(isSold(name)) btn.classList.add("sold");
    const icon = document.createElement("div"); icon.className = "icon"; icon.textContent = "💺";
    const seatNo = document.createElement("div"); seatNo.className = "seatNo"; seatNo.textContent = name;
    btn.appendChild(icon); btn.appendChild(seatNo);
    btn.onclick = (e) => { e.preventDefault(); toggleSeat(name); };
    return btn;
}

function toggleSeat(name) {
    seatState[name] = !isSold(name);
    safariSafeSave("ESSD_SEATS", seatState);
    refresh();
}

const settingBtn = document.getElementById("setting"); const panel = document.getElementById("panel");
settingBtn.onclick = (e) => { e.stopPropagation(); panel.classList.toggle("open"); };
document.onclick = (e) => { if(!panel.contains(e.target) && e.target !== settingBtn) panel.classList.remove("open"); };

document.getElementById("save").onclick = () => {
    infoState.aircraft = document.getElementById("aircraftInput").value;
    safariSafeSave("ESSD_INFO", infoState);
    panel.classList.remove("open");
    refresh();
    alert("기종 정보가 변경되었습니다.");
};
document.getElementById("reset").onclick = () => {
    if(prompt("관리자 비밀번호를 입력하세요.") === "1234" && confirm("초기화하시겠습니까?")) {
        seatState = {}; try{localStorage.removeItem("ESSD_SEATS");}catch(e){}
        refresh();
    }
};

refresh();
</script>
</body>
</html>
